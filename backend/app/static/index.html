<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Personal Assistant</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0d1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PA">
<link rel="apple-touch-icon" href="/static/icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
:root {
  --bg:          #0d1117;
  --bg2:         #13181f;
  --bg3:         #1a2030;
  --border:      #252d3a;
  --border2:     #2d3748;
  --accent:      #3b9eff;
  --accent-dim:  rgba(59,158,255,.12);
  --accent2:     #34d058;
  --text:        #dde5f0;
  --text2:       #7a8899;
  --text3:       #4e5a6a;
  --bubble-user: #1a3a6b;
  --bubble-ai:   #161c27;
  --red:         #f05252;
  --radius:      12px;
  --radius-sm:   8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  overflow: hidden;
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ── Login ── */
#login-screen {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 50% 40%, #0f1823 0%, var(--bg) 70%);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.login-card {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 40px 44px;
  width: 380px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  box-shadow: 0 24px 64px rgba(0,0,0,.5), 0 1px 0 rgba(255,255,255,.04) inset;
}
.login-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 8px;
}
.login-logo svg {
  color: var(--accent);
  flex-shrink: 0;
}
.login-card h1 {
  font-family: "Outfit", sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -.01em;
}
.login-field {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 8px;
}
.login-field label {
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  letter-spacing: .01em;
}
.login-card input[type=password] {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: inherit;
  font-size: 15px;
  padding: 10px 14px;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
  width: 100%;
}
.login-card input[type=password]:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}
.login-card input[type=password]::placeholder { color: var(--text3); }
.login-card button[type=submit], #login-btn {
  background: var(--accent);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  cursor: pointer;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  padding: 11px;
  margin-top: 8px;
  transition: opacity .15s, transform .1s;
  letter-spacing: .01em;
}
.login-card button[type=submit]:hover, #login-btn:hover { opacity: .88; transform: translateY(-1px); }
.login-card button[type=submit]:active, #login-btn:active { transform: translateY(0); opacity: .95; }
#login-error {
  color: var(--red);
  font-size: 13px;
  text-align: center;
  margin-top: 4px;
}

/* ── App layout ── */
#app {
  display: grid;
  grid-template-columns: 256px 1fr;
  height: 100dvh;
}

/* ── Sidebar ── */
#sidebar {
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-header {
  padding: 16px 16px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sidebar-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: "Outfit", sans-serif;
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--text2);
}
.sidebar-title svg { color: var(--text3); }
#refresh-memory-btn {
  background: none;
  border: 1px solid var(--border2);
  border-radius: 6px;
  color: var(--text2);
  cursor: pointer;
  font-family: inherit;
  font-size: 11px;
  font-weight: 500;
  padding: 4px 9px;
  transition: color .15s, border-color .15s, background .15s;
  display: flex;
  align-items: center;
  gap: 4px;
}
#refresh-memory-btn:hover {
  color: var(--accent);
  border-color: var(--accent);
  background: var(--accent-dim);
}
.memory-section { margin-top: 16px; }
.memory-section:first-child { margin-top: 4px; }
.memory-section h3 {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--text3);
  padding: 0 4px;
  margin-bottom: 8px;
}
.memory-section ul {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.memory-section li {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 12.5px;
  line-height: 1.5;
  padding: 7px 10px;
  color: var(--text);
  word-break: break-word;
  transition: border-color .15s;
}
.memory-section li:hover { border-color: var(--border2); }
.memory-section li strong { color: var(--accent); font-weight: 600; }
.muted {
  color: var(--text3) !important;
  font-style: italic;
  border-color: transparent !important;
  background: transparent !important;
  font-size: 12px !important;
  padding: 4px 4px !important;
}

/* ── Chat main ── */
#chat-main {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#chat-header {
  align-items: center;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 10px;
  padding: 0 20px;
  height: 56px;
  flex-shrink: 0;
}
.header-title {
  font-family: "Outfit", sans-serif;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: -.01em;
  color: var(--text);
  flex: 1;
}
.header-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  padding: 4px 10px;
  border-radius: 20px;
  background: var(--bg3);
  border: 1px solid var(--border);
}
.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--text3);
  flex-shrink: 0;
  transition: background .3s;
}
.status-dot.connected { background: var(--accent2); box-shadow: 0 0 6px rgba(52,208,88,.4); }
.status-dot.disconnected { background: var(--red); }
.status-dot.error { background: var(--red); }
#status-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  transition: color .3s;
}

/* ── Messages ── */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 24px 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}
#messages.drag-over {
  outline: 2px dashed var(--accent);
  outline-offset: -6px;
  border-radius: 4px;
}
.message {
  max-width: 76%;
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: 14.5px;
  line-height: 1.65;
  word-break: break-word;
}
.message-user {
  background: var(--bubble-user);
  border: 1px solid rgba(59,158,255,.2);
  align-self: flex-end;
  border-bottom-right-radius: 4px;
  white-space: pre-wrap;
}
.message-assistant {
  background: var(--bubble-ai);
  border: 1px solid var(--border);
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.message-assistant.streaming { opacity: .92; }

/* Markdown inside assistant bubbles */
.message-assistant h1,
.message-assistant h2,
.message-assistant h3 {
  margin: .7em 0 .3em;
  font-weight: 700;
  letter-spacing: -.01em;
}
.message-assistant h1 { font-size: 1.15em; }
.message-assistant h2 { font-size: 1.05em; }
.message-assistant h3 { font-size: 1em; }
.message-assistant p { margin: .35em 0; }
.message-assistant p:first-child { margin-top: 0; }
.message-assistant p:last-child { margin-bottom: 0; }
.message-assistant ul,
.message-assistant ol {
  padding-left: 1.5em;
  margin: .35em 0;
}
.message-assistant li { margin: .15em 0; }
.message-assistant code:not(pre code) {
  background: rgba(110,118,129,.18);
  border: 1px solid rgba(110,118,129,.25);
  border-radius: 4px;
  font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
  font-size: .82em;
  padding: .1em .35em;
}
.message-assistant pre {
  background: #0a0f16;
  border: 1px solid var(--border);
  border-radius: 10px;
  margin: .6em 0;
  overflow-x: auto;
}
.message-assistant pre code {
  font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
  font-size: 13px;
  padding: 14px 16px;
  display: block;
}
.message-assistant table {
  border-collapse: collapse;
  font-size: 13px;
  margin: .5em 0;
  width: 100%;
}
.message-assistant th,
.message-assistant td {
  border: 1px solid var(--border);
  padding: 7px 11px;
  text-align: left;
}
.message-assistant th {
  background: var(--bg3);
  font-weight: 600;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: .04em;
  color: var(--text2);
}
.message-assistant blockquote {
  border-left: 3px solid var(--accent);
  color: var(--text2);
  margin: .5em 0;
  padding: 2px 0 2px 14px;
  font-style: italic;
}
.message-assistant a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
.message-assistant a:hover { opacity: .8; }

/* Tool badges */
.tool-badge {
  align-self: flex-start;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 20px;
  color: var(--text2);
  font-size: 12px;
  font-weight: 500;
  padding: 5px 13px;
  animation: fadeIn .2s ease;
  transition: opacity .4s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.tool-badge::before {
  content: '';
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 1.2s ease-in-out infinite;
  flex-shrink: 0;
}
.tool-badge.done { opacity: 0; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .35; } }

/* ── Upload preview ── */
#upload-preview {
  align-items: center;
  background: var(--bg3);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  padding: 8px 16px;
  font-size: 13px;
  color: var(--text2);
}
#upload-preview svg { color: var(--accent); flex-shrink: 0; }
#upload-cancel-btn {
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  padding: 2px 4px;
  margin-left: auto;
  border-radius: 4px;
  transition: color .15s, background .15s;
  display: flex;
  align-items: center;
}
#upload-cancel-btn:hover { color: var(--red); background: rgba(240,82,82,.1); }

/* ── Input bar ── */
#input-form {
  align-items: flex-end;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  padding-bottom: max(12px, env(safe-area-inset-bottom, 0px));
}
#upload-label {
  cursor: pointer;
  color: var(--text3);
  padding: 8px 6px;
  opacity: 1;
  transition: color .15s;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  border-radius: 6px;
  transition: color .15s, background .15s;
}
#upload-label:hover { color: var(--accent); background: var(--accent-dim); }
#message-input {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--text);
  flex: 1;
  font-family: inherit;
  font-size: 14.5px;
  line-height: 1.55;
  max-height: 200px;
  outline: none;
  padding: 9px 14px;
  resize: none;
  transition: border-color .15s, box-shadow .15s;
}
#message-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}
#message-input:disabled { opacity: .45; }
#message-input::placeholder { color: var(--text3); }
#send-btn {
  background: var(--accent);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 40px;
  height: 40px;
  transition: opacity .15s, transform .1s;
}
#send-btn:hover { opacity: .88; transform: translateY(-1px); }
#send-btn:active { transform: translateY(0); opacity: .95; }
#send-btn:disabled { opacity: .35; cursor: default; transform: none; }

.hidden { display: none !important; }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* ── Mic button ── */
#mic-btn {
  background: none;
  border: none;
  border-radius: var(--radius-sm);
  color: var(--text3);
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 40px;
  height: 40px;
  transition: color .15s, background .15s;
}
#mic-btn:hover { color: var(--accent); background: var(--accent-dim); }
#mic-btn.recording {
  color: var(--red);
  background: rgba(240,82,82,.12);
  animation: mic-pulse 1.4s ease-in-out infinite;
}
@keyframes mic-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(240,82,82,.45); border-radius: var(--radius-sm); }
  60%       { box-shadow: 0 0 0 7px rgba(240,82,82,0); border-radius: var(--radius-sm); }
}

/* ── Speaker button on assistant messages ── */
.speak-btn {
  background: none;
  border: none;
  border-radius: 4px;
  color: var(--text3);
  cursor: pointer;
  padding: 2px 4px;
  opacity: 0;
  transition: opacity .15s, color .15s;
  display: inline-flex;
  align-items: center;
  vertical-align: middle;
  margin-left: 4px;
  flex-shrink: 0;
}
.message-assistant:hover .speak-btn { opacity: 1; }
.speak-btn.speaking { opacity: 1; color: var(--accent); }

/* Always visible on touch devices */
@media (hover: none) {
  .speak-btn { opacity: .55; }
}

/* ── Conversation list ── */
#conv-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px 8px;
}
.conv-item {
  display: flex;
  align-items: center;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background .12s;
  gap: 8px;
  border: 1px solid transparent;
}
.conv-item:hover { background: var(--bg3); }
.conv-item.active { background: var(--bg3); border-color: var(--border2); }
.conv-item-title {
  font-size: 13px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}
.conv-item.active .conv-item-title { color: var(--accent); }
.conv-item-title.untitled { color: var(--text2); font-style: italic; }
.conv-item-time { font-size: 11px; color: var(--text3); flex-shrink: 0; }
.conv-empty { color: var(--text3); font-size: 12px; font-style: italic; padding: 12px 10px; }
.conv-item-del {
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  padding: 2px 5px;
  border-radius: 4px;
  display: none;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: color .15s, background .15s;
  line-height: 1;
}
.conv-item:hover .conv-item-del { display: flex; }
.conv-item-del:hover { color: var(--red); background: rgba(240,82,82,.1); }
.msg-time {
  display: block;
  font-size: 10px;
  color: var(--text3);
  margin-top: 5px;
  letter-spacing: .01em;
}
.message-user .msg-time { text-align: right; }
.message-assistant .msg-time { text-align: left; }

/* ── New chat button ── */
#new-chat-btn {
  background: none;
  border: 1px solid var(--border2);
  border-radius: 6px;
  color: var(--text2);
  cursor: pointer;
  font-family: inherit;
  font-size: 11px;
  font-weight: 500;
  padding: 4px 9px;
  transition: color .15s, border-color .15s, background .15s;
  display: flex;
  align-items: center;
  gap: 4px;
}
#new-chat-btn:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }

/* ── Memory section (collapsible bottom of sidebar) ── */
#memory-section {
  flex-shrink: 0;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}
.memory-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  cursor: pointer;
  user-select: none;
  transition: background .12s;
}
.memory-header:hover { background: var(--bg3); }
.memory-header-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: "Outfit", sans-serif;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--text2);
}
.memory-header-title svg { color: var(--text3); }
.memory-header-actions { display: flex; align-items: center; gap: 6px; }
.memory-caret { color: var(--text3); transition: transform .2s; flex-shrink: 0; }
.memory-caret.open { transform: rotate(180deg); }
#memory-body { overflow-y: auto; max-height: 280px; }
.memory-inner { padding: 4px 12px 12px; }
.memory-inner .memory-section { margin-top: 12px; }
.memory-inner .memory-section:first-child { margin-top: 4px; }

/* ── Mobile menu button (hidden on desktop) ── */
#menu-btn {
  display: none;
  background: none;
  border: none;
  color: var(--text2);
  cursor: pointer;
  padding: 6px;
  margin-right: 2px;
  flex-shrink: 0;
  border-radius: 6px;
  transition: color .15s, background .15s;
  align-items: center;
  justify-content: center;
}
#menu-btn:hover { color: var(--text); background: var(--bg3); }

/* ── Sidebar overlay backdrop (mobile) ── */
#sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(2px);
  z-index: 40;
}

/* ── Mobile breakpoint ── */
@media (max-width: 640px) {
  #app {
    grid-template-columns: 1fr;
  }

  #sidebar {
    position: fixed;
    top: 0;
    left: -272px;
    width: 272px;
    height: 100dvh;
    z-index: 50;
    transition: left .25s cubic-bezier(.4,0,.2,1);
    box-shadow: 4px 0 32px rgba(0,0,0,.5);
  }

  #sidebar.open {
    left: 0;
  }

  #sidebar-overlay.visible {
    display: block;
  }

  #menu-btn {
    display: flex;
  }

  .login-card {
    width: calc(100vw - 32px);
    padding: 32px 24px;
  }

  .message {
    max-width: 92%;
  }

  /* Prevent iOS auto-zoom on input focus */
  #message-input,
  .login-card input[type=password] {
    font-size: 16px;
  }

  #messages {
    padding: 16px 16px 12px;
  }

  #input-form {
    padding: 10px 12px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
  }

  #chat-header {
    padding: 0 16px;
    height: 52px;
  }

  .header-status { display: none; }
}
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">

        <path d="M12 2a4 4 0 0 1 4 4v1h1a3 3 0 0 1 3 3v7a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3v-7a3 3 0 0 1 3-3h1V6a4 4 0 0 1 4-4z"/>
        <circle cx="9" cy="13" r="1" fill="currentColor" stroke="none"/>

    <p id="login-error" class="hidden"></p>

</div>

<!-- App -->
<div id="app" class="hidden">
  <aside id="sidebar">

    <div id="conv-list"><div class="conv-empty">Loading…</div></div>

            <path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3"/>
          </svg>
          Memory
        </span>
        <div class="memory-header-actions">
          <button id="refresh-memory-btn" title="Refresh memory">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">

      <div id="memory-body" class="hidden">

    <header id="chat-header">

          <line x1="3" y1="6" x2="21" y2="6"/>

      </svg>

          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>

      <label id="upload-label" for="file-input" title="Attach file">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>

          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <button type="submit" id="send-btn" title="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </form>
  </main>
</div>

<script>
// ── Configure marked ────────────────────────────────────────────────────────
marked.use({
  gfm: true,
  breaks: true,
  renderer: {
    code(token) {
      const lang = token.lang || '';
      const validLang = hljs.getLanguage(lang) ? lang : '';
      const highlighted = validLang
        ? hljs.highlight(token.text, { language: validLang }).value
        : hljs.highlightAuto(token.text).value;
      return `<pre><code class="hljs language-${lang}">${highlighted}</code></pre>`;
    }
  }
});

// ── State ───────────────────────────────────────────────────────────────────
let token = localStorage.getItem('pa_token') || '';
let currentChatId = localStorage.getItem('pa_chat_id') || null;
if (!currentChatId) {
  currentChatId = 'web_' + (crypto.randomUUID ? crypto.randomUUID().replace(/-/g,'') : Date.now().toString(36));
  localStorage.setItem('pa_chat_id', currentChatId);
}
let ws = null;
let pendingMediaId = null;
let pendingFilename = null;
let activeToolBadges = {};
let currentAiEl = null;
let currentAiRaw = '';
let currentAiTs = '';
let reconnectTimer = null;
let memoryOpen = false;

// ── DOM refs ────────────────────────────────────────────────────────────────
const loginScreen  = document.getElementById('login-screen');
const appEl        = document.getElementById('app');
const tokenInput   = document.getElementById('token-input');
const loginBtn     = document.getElementById('login-btn');
const loginError   = document.getElementById('login-error');
const statusDot    = document.getElementById('status-dot');
const statusLabel  = document.getElementById('status-label');
const messagesEl   = document.getElementById('messages');
const uploadPreview= document.getElementById('upload-preview');
const uploadFilename= document.getElementById('upload-filename');
const fileInput    = document.getElementById('file-input');
const messageInput = document.getElementById('message-input');
const sendBtn      = document.getElementById('send-btn');
const inputForm    = document.getElementById('input-form');
const factsList    = document.getElementById('facts-list');
const rulesList    = document.getElementById('rules-list');

// ── Auth & connection ───────────────────────────────────────────────────────
function showLogin(err) {
  appEl.classList.add('hidden');
  loginScreen.classList.remove('hidden');
  if (err) {
    loginError.textContent = err;
    loginError.classList.remove('hidden');
  } else {
    loginError.classList.add('hidden');
  }
}

function showApp() {
  loginScreen.classList.add('hidden');
  appEl.classList.remove('hidden');
  loadConversations();
}

function setStatus(state) {
  statusDot.className = 'status-dot ' + state;
  const labels = { connected: 'Connected', disconnected: 'Reconnecting…', error: 'Error' };
  if (statusLabel) statusLabel.textContent = labels[state] || state;
}

function connectWebSocket() {
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = `${proto}//${location.host}/ws/chat?token=${encodeURIComponent(token)}&chat_id=${encodeURIComponent(currentChatId)}`;
  ws = new WebSocket(url);

  ws.onopen = () => {
    setStatus('connected');
    showApp();
    localStorage.setItem('pa_token', token);
  };

  ws.onclose = e => {
    setStatus('disconnected');
    ws = null;
    if (e.code === 4403) {
      localStorage.removeItem('pa_token');
      token = '';
      showLogin('Invalid token — please try again.');
    } else {
      reconnectTimer = setTimeout(connectWebSocket, 3000);
    }
  };

  ws.onerror = () => setStatus('error');
  ws.onmessage = e => handleServerMsg(JSON.parse(e.data));
}

loginBtn.addEventListener('click', () => {
  token = tokenInput.value.trim();
  if (token) connectWebSocket();
});
tokenInput.addEventListener('keydown', e => { if (e.key === 'Enter') loginBtn.click(); });

// ── Server message handler ──────────────────────────────────────────────────
function handleServerMsg(msg) {
  switch (msg.type) {
    case 'history':
      renderHistory(msg.messages);
      loadConversations();
      break;
    case 'conversation_updated':
      loadConversations();
      break;
    case 'token':
      appendToken(msg.content);
      break;
    case 'tool_start':
      showToolBadge(msg.name);
      break;
    case 'tool_end':
      hideToolBadge(msg.name);
      break;
    case 'done':
      finalizeAiMsg(msg.full_reply);
      break;
    case 'error':
      finalizeAiMsg('');
      addSystemMsg('⚠️ ' + (msg.message || 'Error'));
      enableInput();
      break;
  }
}

// ── Message rendering ───────────────────────────────────────────────────────
function isRtl(text) {
  return /[\u0590-\u05FF\u0600-\u06FF]/.test(text);
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

const SPEAK_SVG = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`;
const STOP_SVG  = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12" rx="1.5"/></svg>`;

function attachSpeakBtn(div, getText) {
  const btn = document.createElement('button');
  btn.className = 'speak-btn';
  btn.title = 'Read aloud';
  btn.innerHTML = SPEAK_SVG;
  btn.addEventListener('click', () => speakText(getText(), btn));
  div.appendChild(btn);
}

function formatMsgTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  if (isNaN(d)) return '';
  const now = new Date();
  const isToday = d.toDateString() === now.toDateString();
  const time = d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
  if (isToday) return time;
  const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
  if (d.toDateString() === yesterday.toDateString()) return `Yesterday ${time}`;
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) + ' ' + time;
}

function addMessage(role, content, ts) {
  const text = extractText(content);
  const div = document.createElement('div');
  div.className = `message message-${role}`;
  if (role === 'assistant') {
    div.innerHTML = marked.parse(text || '');
    attachSpeakBtn(div, () => text);
  } else {
    div.textContent = text;
  }
  if (isRtl(text)) div.setAttribute('dir', 'rtl');
  if (ts) {
    const timeEl = document.createElement('span');
    timeEl.className = 'msg-time';
    timeEl.textContent = formatMsgTime(ts);
    div.appendChild(timeEl);
  }
  messagesEl.appendChild(div);
  scrollBottom();
  return div;
}

function addSystemMsg(text) {
  const div = document.createElement('div');
  div.style.cssText = 'align-self:center;color:var(--text2);font-size:12px;padding:4px 0;';
  div.textContent = text;
  messagesEl.appendChild(div);
  scrollBottom();
}

function renderHistory(messages) {
  messagesEl.innerHTML = '';
  activeToolBadges = {};
  currentAiEl = null;
  if (!messages.length) {
    addSystemMsg('Start a conversation to get going.');
    return;
  }
  messages.forEach(m => addMessage(m.role, m.content, m.ts));
}

function extractText(val) {
  if (typeof val === 'string') return val;
  if (Array.isArray(val)) return val.map(b => (b && b.text) ? b.text : String(b)).join('');
  if (val && typeof val === 'object' && val.text) return val.text;
  return '';
}

function appendToken(tok) {
  if (!currentAiEl) {
    currentAiEl = document.createElement('div');
    currentAiEl.className = 'message message-assistant streaming';
    currentAiRaw = '';
    currentAiTs = new Date().toISOString();
    messagesEl.appendChild(currentAiEl);
  }
  currentAiRaw += extractText(tok);
  currentAiEl.innerHTML = marked.parse(currentAiRaw);
  scrollBottom();
}

function finalizeAiMsg(fullReply) {
  if (currentAiEl) {
    currentAiEl.classList.remove('streaming');
    const content = fullReply || currentAiRaw;
    if (content) {
      currentAiEl.innerHTML = marked.parse(content);
      currentAiEl.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
      if (isRtl(content)) currentAiEl.setAttribute('dir', 'rtl');
      attachSpeakBtn(currentAiEl, () => content);
      if (autoSpeak) speakText(content, null);
    }
    if (currentAiTs) {
      const timeEl = document.createElement('span');
      timeEl.className = 'msg-time';
      timeEl.textContent = formatMsgTime(currentAiTs);
      currentAiEl.appendChild(timeEl);
    }
    currentAiEl = null;
    currentAiRaw = '';
    currentAiTs = '';
  }
  Object.values(activeToolBadges).forEach(el => el.remove());
  activeToolBadges = {};
  enableInput();
}

function showToolBadge(name) {
  const labels = {
    web_search: '🔍 Searching web',
    wikipedia_search: '📖 Wikipedia',
    fetch_url: '🌐 Fetching page',
    get_weather: '🌤️ Weather',
    gmail_read: '📧 Reading Gmail',
    gmail_send: '📤 Sending email',
    calendar_list: '📅 Calendar',
    calendar_create: '📅 Creating event',
    drive_save_photo: '📸 Saving to Drive',
    drive_save_document: '📄 Saving to Drive',
    drive_list_files: '📁 Drive files',
    save_fact: '💾 Saving fact',
    save_rule: '📌 Saving rule',
    list_memory: '🧠 Memory',
    delete_fact: '🗑️ Deleting fact',
    delete_rule: '🗑️ Deleting rule',
    list_tuya_devices: '🏠 Smart home',
    get_device_status: '🏠 Device status',
    control_device: '🏠 Controlling device',
    google_connect: '🔗 Google auth',
  };
  if (activeToolBadges[name]) return;
  const badge = document.createElement('div');
  badge.className = 'tool-badge';
  badge.textContent = labels[name] || `⚙️ ${name}`;
  messagesEl.appendChild(badge);
  activeToolBadges[name] = badge;
  scrollBottom();
}

function hideToolBadge(name) {
  const badge = activeToolBadges[name];
  if (!badge) return;
  badge.classList.add('done');
  setTimeout(() => { badge.remove(); delete activeToolBadges[name]; }, 450);
}

// ── Send ────────────────────────────────────────────────────────────────────
inputForm.addEventListener('submit', e => {
  e.preventDefault();
  const text = messageInput.value.trim();
  if (!text && !pendingMediaId) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) return;

  const displayText = pendingFilename
    ? `📎 ${pendingFilename}${text ? '\n' + text : ''}`
    : text;
  addMessage('user', displayText, new Date().toISOString());

  ws.send(JSON.stringify({ type: 'message', text, media_id: pendingMediaId || null }));

  messageInput.value = '';
  messageInput.style.height = 'auto';
  pendingMediaId = null;
  pendingFilename = null;
  hideUploadPreview();
  disableInput();
});

messageInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 200) + 'px';
});

messageInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    inputForm.dispatchEvent(new Event('submit'));
  }
});

function disableInput() {
  sendBtn.disabled = true;
  messageInput.disabled = true;
}

function enableInput() {
  sendBtn.disabled = false;
  messageInput.disabled = false;
  messageInput.focus();
}

// ── File upload ─────────────────────────────────────────────────────────────
fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) doUpload(file);
});

document.getElementById('upload-cancel-btn').addEventListener('click', () => {
  pendingMediaId = null;
  pendingFilename = null;
  fileInput.value = '';
  hideUploadPreview();
});

async function doUpload(file) {
  const form = new FormData();
  form.append('file', file);
  try {
    const res = await fetch('/api/upload', {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}` },
      body: form,
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    pendingMediaId = data.media_id;
    pendingFilename = data.filename;
    showUploadPreview(data.filename);
  } catch (err) {
    addSystemMsg(`⚠️ Upload failed: ${err.message}`);
  }
}

function showUploadPreview(fname) {
  uploadFilename.textContent = fname;
  uploadPreview.classList.remove('hidden');
}

function hideUploadPreview() {
  uploadPreview.classList.add('hidden');
  uploadFilename.textContent = '';
}

// Drag-and-drop onto messages area
messagesEl.addEventListener('dragover', e => { e.preventDefault(); messagesEl.classList.add('drag-over'); });
messagesEl.addEventListener('dragleave', () => messagesEl.classList.remove('drag-over'));
messagesEl.addEventListener('drop', e => {
  e.preventDefault();
  messagesEl.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) doUpload(file);
});

// ── Conversations ────────────────────────────────────────────────────────────
function relTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const sec = Math.floor((Date.now() - d) / 1000);
  if (sec < 60) return 'just now';
  const min = Math.floor(sec / 60);
  if (min < 60) return `${min}m ago`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr}h ago`;
  const day = Math.floor(hr / 24);
  if (day === 1) return 'yesterday';
  if (day < 7) return `${day}d ago`;
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

async function loadConversations() {
  try {
    const res = await fetch('/api/conversations', { headers: { Authorization: `Bearer ${token}` } });
    if (!res.ok) return;
    renderConversations(await res.json());
  } catch { /* silent */ }
}

function renderConversations(convs) {
  const list = document.getElementById('conv-list');
  if (!convs.length) {
    list.innerHTML = '<div class="conv-empty">No conversations yet</div>';
    return;
  }
  list.innerHTML = convs.map(c => {
    const isNew = !c.title || c.title === 'New conversation';
    return `<div class="conv-item${c.id === currentChatId ? ' active' : ''}" data-id="${escHtml(c.id)}">
      <span class="conv-item-title${isNew ? ' untitled' : ''}">${escHtml(c.title || 'New conversation')}</span>
      <span class="conv-item-time">${relTime(c.updated_at)}</span>
      <button class="conv-item-del" data-id="${escHtml(c.id)}" title="Delete conversation">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg>
      </button>
    </div>`;
  }).join('');
}

document.getElementById('conv-list').addEventListener('click', e => {
  const delBtn = e.target.closest('.conv-item-del');
  if (delBtn) { e.stopPropagation(); deleteConversation(delBtn.dataset.id); return; }
  const item = e.target.closest('.conv-item');
  if (item) switchConversation(item.dataset.id);
});

async function deleteConversation(id) {
  if (!confirm('Delete this conversation? This cannot be undone.')) return;
  try {
    const res = await fetch(`/api/conversations/${encodeURIComponent(id)}`, {
      method: 'DELETE',
      headers: { Authorization: `Bearer ${token}` },
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    if (id === currentChatId) {
      currentChatId = 'web_' + (crypto.randomUUID ? crypto.randomUUID().replace(/-/g,'') : Date.now().toString(36));
      localStorage.setItem('pa_chat_id', currentChatId);
      if (ws) { ws.onclose = null; ws.close(); ws = null; }
      connectWebSocket();
    } else {
      loadConversations();
    }
  } catch (err) {
    addSystemMsg('⚠️ Delete failed: ' + err.message);
  }
}

function switchConversation(id) {
  if (id === currentChatId && ws && ws.readyState === WebSocket.OPEN) {
    if (window.innerWidth <= 640) closeSidebar();
    return;
  }
  currentChatId = id;
  localStorage.setItem('pa_chat_id', id);
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
  connectWebSocket();
  if (window.innerWidth <= 640) closeSidebar();
}

document.getElementById('new-chat-btn').addEventListener('click', () => {
  currentChatId = 'web_' + (crypto.randomUUID ? crypto.randomUUID().replace(/-/g,'') : Date.now().toString(36));

// ── Memory sidebar ──────────────────────────────────────────────────────────
async function loadMemory() {
  try {
    const res = await fetch('/api/memory', { headers: { Authorization: `Bearer ${token}` } });
    if (!res.ok) return;
    const { facts, rules } = await res.json();

    factsList.innerHTML = facts.length
      ? facts.map(f => `<li><strong>${escHtml(f.key)}</strong>: ${escHtml(f.value)}</li>`).join('')
      : '<li class="muted">No facts saved yet</li>';

    rulesList.innerHTML = rules.length
      ? rules.map(r => `<li>${escHtml(r.rule)}</li>`).join('')
      : '<li class="muted">No rules saved yet</li>';
  } catch { /* silent */ }
}

document.getElementById('memory-toggle').addEventListener('click', e => {
  if (e.target.closest('#refresh-memory-btn')) return;
  memoryOpen = !memoryOpen;
  document.getElementById('memory-body').classList.toggle('hidden', !memoryOpen);
  document.querySelector('.memory-caret').classList.toggle('open', memoryOpen);
  if (memoryOpen) loadMemory();
});

document.getElementById('refresh-memory-btn').addEventListener('click', e => {
  e.stopPropagation();
  loadMemory();
});

// ── Voice: STT (faster-whisper via backend) + TTS (SpeechSynthesis) ─────────
let mediaRecorder  = null;
let audioChunks    = [];
let autoSpeak      = localStorage.getItem('pa_autospeak') === '1';
let activeSpeakBtn = null;
const micBtn       = document.getElementById('mic-btn');
const defaultPlaceholder = messageInput.placeholder;

// Pick the best supported MIME type for recording
const AUDIO_MIME = ['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/ogg;codecs=opus']
  .find(t => MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(t)) || '';

micBtn.addEventListener('click', () => {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    stopRecording();
  } else {
    startRecording();
  }
});

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    const opts = AUDIO_MIME ? { mimeType: AUDIO_MIME } : {};
    mediaRecorder = new MediaRecorder(stream, opts);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = handleRecordingStop;
    mediaRecorder.start();
    micBtn.classList.add('recording');
    messageInput.placeholder = 'Recording… tap mic to stop';
  } catch {
    addSystemMsg('⚠️ Microphone access denied');
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
  }
  micBtn.classList.remove('recording');
  messageInput.placeholder = defaultPlaceholder;
}

async function handleRecordingStop() {
  const mime = (audioChunks[0] && audioChunks[0].type) || AUDIO_MIME || 'audio/webm';
  const blob = new Blob(audioChunks, { type: mime });
  audioChunks = [];

  messageInput.placeholder = 'Transcribing…';
  messageInput.disabled = true;
  micBtn.disabled = true;

  try {
    const ext = mime.includes('mp4') ? 'mp4' : mime.includes('ogg') ? 'ogg' : 'webm';
    const form = new FormData();
    form.append('file', blob, `audio.${ext}`);
    const res = await fetch('/api/stt', {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}` },
      body: form,
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const { text } = await res.json();
    if (text) {
      messageInput.value = text;
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 200) + 'px';
      inputForm.dispatchEvent(new Event('submit'));
    }
  } catch (err) {
    addSystemMsg('⚠️ Transcription failed: ' + err.message);
  } finally {
    messageInput.disabled = false;
    micBtn.disabled = false;
    messageInput.placeholder = defaultPlaceholder;
  }
}

// ── TTS via browser SpeechSynthesis ──────────────────────────────────────────
function speakText(text, btn) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  if (activeSpeakBtn) {
    activeSpeakBtn.innerHTML = SPEAK_SVG;
    activeSpeakBtn.classList.remove('speaking');
    activeSpeakBtn = null;
  }
  const plain = text.replace(/```[\s\S]*?```/g, 'code block').replace(/[*_~`#>]/g, '');
  const utt = new SpeechSynthesisUtterance(plain);
  // Prefer a natural-sounding voice
  const pickVoice = () => {
    const voices = speechSynthesis.getVoices();
    return voices.find(v => /google|samantha|karen|daniel|moira/i.test(v.name))
        || voices.find(v => v.lang.startsWith('en') && v.localService)
        || voices[0];
  };
  const voice = pickVoice();
  if (voice) utt.voice = voice;
  utt.rate = 1.05;
  if (btn) {
    btn.innerHTML = STOP_SVG;
    btn.classList.add('speaking');
    activeSpeakBtn = btn;
    btn.onclick = () => { speechSynthesis.cancel(); };
  }
  utt.onend = utt.onerror = () => {
    if (btn) { btn.innerHTML = SPEAK_SVG; btn.classList.remove('speaking'); btn.onclick = () => speakText(text, btn); }
    if (activeSpeakBtn === btn) activeSpeakBtn = null;
  };
  // Voices may not be loaded yet on first call
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.addEventListener('voiceschanged', () => { if (!utt.voice) utt.voice = pickVoice(); }, { once: true });
  }
  speechSynthesis.speak(utt);
}

const sidebar      = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebar-overlay');

function openSidebar() {
  sidebar.classList.add('open');
  sidebarOverlay.classList.add('visible');
}

  sidebar.classList.remove('open');
  sidebarOverlay.classList.remove('visible');
}

  sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
});
sidebarOverlay.addEventListener('click', closeSidebar);
