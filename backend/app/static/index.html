<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Assistant</title>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
:root {
  --bg: #0d1117;
  --bg2: #161b22;
  --bg3: #1c2128;
  --border: #30363d;
  --accent: #58a6ff;
  --accent2: #3fb950;
  --text: #e6edf3;
  --text2: #8b949e;
  --bubble-user: #1f4074;
  --bubble-ai: #1c2128;
  --red: #f85149;
  --radius: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  overflow: hidden;
}

/* ── Login ── */
#login-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.login-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 40px 48px;
  width: 360px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.login-card h1 {
  font-size: 22px;
  font-weight: 600;
  text-align: center;
  color: var(--accent);
}
.login-card input[type=password] {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 15px;
  padding: 10px 14px;
  outline: none;
  transition: border-color .15s;
}
.login-card input[type=password]:focus { border-color: var(--accent); }
.login-card button {
  background: var(--accent);
  border: none;
  border-radius: 8px;
  color: #fff;
  cursor: pointer;
  font-size: 15px;
  font-weight: 600;
  padding: 10px;
  transition: opacity .15s;
}
.login-card button:hover { opacity: .85; }
#login-error {
  color: var(--red);
  font-size: 13px;
  text-align: center;
}

/* ── App layout ── */
#app {
  display: grid;
  grid-template-columns: 260px 1fr;
  height: 100dvh;
}

/* ── Sidebar ── */
#sidebar {
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-header {
  padding: 16px;
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
#refresh-memory-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text2);
  cursor: pointer;
  font-size: 11px;
  padding: 3px 8px;
  transition: color .15s, border-color .15s;
}
#refresh-memory-btn:hover { color: var(--accent); border-color: var(--accent); }
#sidebar-body {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}
.memory-section h3 {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text2);
  margin: 12px 0 6px;
}
.memory-section ul {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.memory-section li {
  background: var(--bg3);
  border-radius: 6px;
  font-size: 12px;
  padding: 6px 8px;
  color: var(--text);
  word-break: break-word;
}
.memory-section li strong { color: var(--accent); }
.muted { color: var(--text2) !important; font-style: italic; }

/* ── Chat main ── */
#chat-main {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#chat-header {
  align-items: center;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 10px;
  padding: 14px 20px;
  font-weight: 600;
  font-size: 16px;
}
.status-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: var(--text2);
  flex-shrink: 0;
  transition: background .3s;
}
.status-dot.connected { background: var(--accent2); }
.status-dot.disconnected { background: var(--red); }
.status-dot.error { background: var(--red); }

/* ── Messages ── */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}
#messages.drag-over {
  outline: 2px dashed var(--accent);
  outline-offset: -4px;
}
.message {
  max-width: 76%;
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: 14.5px;
  line-height: 1.6;
  word-break: break-word;
}
.message-user {
  background: var(--bubble-user);
  align-self: flex-end;
  border-bottom-right-radius: 4px;
  white-space: pre-wrap;
}
.message-assistant {
  background: var(--bubble-ai);
  border: 1px solid var(--border);
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.message-assistant.streaming { opacity: .9; }

/* Markdown inside assistant bubbles */
.message-assistant h1,
.message-assistant h2,
.message-assistant h3 {
  margin: .6em 0 .3em;
  font-size: 1em;
  font-weight: 700;
}
.message-assistant p { margin: .3em 0; }
.message-assistant p:first-child { margin-top: 0; }
.message-assistant p:last-child { margin-bottom: 0; }
.message-assistant ul,
.message-assistant ol {
  padding-left: 1.4em;
  margin: .3em 0;
}
.message-assistant li { margin: .1em 0; }
.message-assistant code:not(pre code) {
  background: rgba(110,118,129,.2);
  border-radius: 4px;
  font-family: ui-monospace, SFMono-Regular, monospace;
  font-size: .85em;
  padding: .1em .35em;
}
.message-assistant pre {
  background: #0d1117;
  border: 1px solid var(--border);
  border-radius: 8px;
  margin: .5em 0;
  overflow-x: auto;
}
.message-assistant pre code {
  font-size: 13px;
  padding: 14px 16px;
  display: block;
}
.message-assistant table {
  border-collapse: collapse;
  font-size: 13px;
  margin: .5em 0;
  width: 100%;
}
.message-assistant th,
.message-assistant td {
  border: 1px solid var(--border);
  padding: 6px 10px;
  text-align: left;
}
.message-assistant th { background: var(--bg3); font-weight: 600; }
.message-assistant blockquote {
  border-left: 3px solid var(--accent);
  color: var(--text2);
  margin: .4em 0;
  padding-left: 12px;
}
.message-assistant a { color: var(--accent); }

/* Tool badges */
.tool-badge {
  align-self: flex-start;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text2);
  font-size: 12px;
  padding: 4px 12px;
  animation: fadeIn .2s ease;
  transition: opacity .4s;
}
.tool-badge.done { opacity: 0; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

/* ── Upload preview ── */
#upload-preview {
  align-items: center;
  background: var(--bg3);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  padding: 8px 16px;
  font-size: 13px;
  color: var(--text2);
}
#upload-cancel-btn {
  background: none;
  border: none;
  color: var(--text2);
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  padding: 2px 4px;
}
#upload-cancel-btn:hover { color: var(--red); }

/* ── Input bar ── */
#input-form {
  align-items: flex-end;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  padding: 12px 16px;
}
#upload-label {
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  padding: 6px 4px;
  opacity: .6;
  transition: opacity .15s;
  flex-shrink: 0;
}
#upload-label:hover { opacity: 1; }
#message-input {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  flex: 1;
  font-family: inherit;
  font-size: 14.5px;
  line-height: 1.5;
  max-height: 200px;
  outline: none;
  padding: 9px 14px;
  resize: none;
  transition: border-color .15s;
}
#message-input:focus { border-color: var(--accent); }
#message-input:disabled { opacity: .5; }
#send-btn {
  background: var(--accent);
  border: none;
  border-radius: 8px;
  color: #fff;
  cursor: pointer;
  flex-shrink: 0;
  font-size: 14px;
  font-weight: 600;
  padding: 9px 18px;
  transition: opacity .15s;
}
#send-btn:hover { opacity: .85; }
#send-btn:disabled { opacity: .4; cursor: default; }

.hidden { display: none !important; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <h1>🤖 Personal Assistant</h1>
    <input type="password" id="token-input" placeholder="Enter access token" autocomplete="current-password">
    <button id="login-btn">Connect</button>
    <p id="login-error" class="hidden"></p>
  </div>
</div>

<!-- App -->
<div id="app" class="hidden">
  <aside id="sidebar">
    <div class="sidebar-header">
      Memory
      <button id="refresh-memory-btn" title="Refresh">↻ Refresh</button>
    </div>
    <div id="sidebar-body">
      <div class="memory-section">
        <h3>Facts</h3>
        <ul id="facts-list"><li class="muted">Loading…</li></ul>
      </div>
      <div class="memory-section">
        <h3>Rules</h3>
        <ul id="rules-list"><li class="muted">Loading…</li></ul>
      </div>
    </div>
  </aside>

  <main id="chat-main">
    <header id="chat-header">
      <div class="status-dot" id="status-dot"></div>
      <span>Personal Assistant</span>
    </header>

    <div id="messages" role="log" aria-live="polite"></div>

    <div id="upload-preview" class="hidden">
      <span>📎</span>
      <span id="upload-filename"></span>
      <button id="upload-cancel-btn" title="Remove">✕</button>
    </div>

    <form id="input-form" autocomplete="off">
      <label id="upload-label" for="file-input" title="Attach file">📎</label>
      <input type="file" id="file-input" hidden>
      <textarea id="message-input" placeholder="Message… (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
      <button type="submit" id="send-btn">Send</button>
    </form>
  </main>
</div>

<script>
// ── Configure marked ────────────────────────────────────────────────────────
marked.setOptions({ gfm: true, breaks: true });
marked.use({
  renderer: {
    code(token) {
      const lang = token.lang || '';
      const validLang = hljs.getLanguage(lang) ? lang : '';
      const highlighted = validLang
        ? hljs.highlight(token.text, { language: validLang }).value
        : hljs.highlightAuto(token.text).value;
      return `<pre><code class="hljs language-${lang}">${highlighted}</code></pre>`;
    }
  }
});

// ── State ───────────────────────────────────────────────────────────────────
let token = localStorage.getItem('pa_token') || '';
let ws = null;
let pendingMediaId = null;
let pendingFilename = null;
let activeToolBadges = {};
let currentAiEl = null;
let currentAiRaw = '';
let reconnectTimer = null;

// ── DOM refs ────────────────────────────────────────────────────────────────
const loginScreen  = document.getElementById('login-screen');
const appEl        = document.getElementById('app');
const tokenInput   = document.getElementById('token-input');
const loginBtn     = document.getElementById('login-btn');
const loginError   = document.getElementById('login-error');
const statusDot    = document.getElementById('status-dot');
const messagesEl   = document.getElementById('messages');
const uploadPreview= document.getElementById('upload-preview');
const uploadFilename= document.getElementById('upload-filename');
const fileInput    = document.getElementById('file-input');
const messageInput = document.getElementById('message-input');
const sendBtn      = document.getElementById('send-btn');
const inputForm    = document.getElementById('input-form');
const factsList    = document.getElementById('facts-list');
const rulesList    = document.getElementById('rules-list');

// ── Auth & connection ───────────────────────────────────────────────────────
function showLogin(err) {
  appEl.classList.add('hidden');
  loginScreen.classList.remove('hidden');
  if (err) {
    loginError.textContent = err;
    loginError.classList.remove('hidden');
  } else {
    loginError.classList.add('hidden');
  }
}

function showApp() {
  loginScreen.classList.add('hidden');
  appEl.classList.remove('hidden');
  loadMemory();
}

function setStatus(state) {
  statusDot.className = 'status-dot ' + state;
  statusDot.title = state;
}

function connectWebSocket() {
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = `${proto}//${location.host}/ws/chat?token=${encodeURIComponent(token)}`;
  ws = new WebSocket(url);

  ws.onopen = () => {
    setStatus('connected');
    showApp();
    localStorage.setItem('pa_token', token);
  };

  ws.onclose = e => {
    setStatus('disconnected');
    ws = null;
    if (e.code === 4403) {
      localStorage.removeItem('pa_token');
      token = '';
      showLogin('Invalid token — please try again.');
    } else {
      reconnectTimer = setTimeout(connectWebSocket, 3000);
    }
  };

  ws.onerror = () => setStatus('error');
  ws.onmessage = e => handleServerMsg(JSON.parse(e.data));
}

loginBtn.addEventListener('click', () => {
  token = tokenInput.value.trim();
  if (token) connectWebSocket();
});
tokenInput.addEventListener('keydown', e => { if (e.key === 'Enter') loginBtn.click(); });

// ── Server message handler ──────────────────────────────────────────────────
function handleServerMsg(msg) {
  switch (msg.type) {
    case 'history':
      renderHistory(msg.messages);
      break;
    case 'token':
      appendToken(msg.content);
      break;
    case 'tool_start':
      showToolBadge(msg.name);
      break;
    case 'tool_end':
      hideToolBadge(msg.name);
      break;
    case 'done':
      finalizeAiMsg(msg.full_reply);
      break;
    case 'error':
      finalizeAiMsg('');
      addSystemMsg('⚠️ ' + (msg.message || 'Error'));
      enableInput();
      break;
  }
}

// ── Message rendering ───────────────────────────────────────────────────────
function isRtl(text) {
  return /[\u0590-\u05FF\u0600-\u06FF]/.test(text);
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function addMessage(role, content) {
  const div = document.createElement('div');
  div.className = `message message-${role}`;
  if (role === 'assistant') {
    div.innerHTML = marked.parse(content || '');
  } else {
    div.textContent = content;
  }
  if (isRtl(content)) div.setAttribute('dir', 'rtl');
  messagesEl.appendChild(div);
  scrollBottom();
  return div;
}

function addSystemMsg(text) {
  const div = document.createElement('div');
  div.style.cssText = 'align-self:center;color:var(--text2);font-size:12px;padding:4px 0;';
  div.textContent = text;
  messagesEl.appendChild(div);
  scrollBottom();
}

function renderHistory(messages) {
  messagesEl.innerHTML = '';
  activeToolBadges = {};
  currentAiEl = null;
  if (!messages.length) {
    addSystemMsg('No conversation history yet. Say hello!');
    return;
  }
  messages.forEach(m => addMessage(m.role, m.content));
}

function appendToken(tok) {
  if (!currentAiEl) {
    currentAiEl = document.createElement('div');
    currentAiEl.className = 'message message-assistant streaming';
    currentAiRaw = '';
    messagesEl.appendChild(currentAiEl);
  }
  currentAiRaw += tok;
  currentAiEl.innerHTML = marked.parse(currentAiRaw);
  scrollBottom();
}

function finalizeAiMsg(fullReply) {
  if (currentAiEl) {
    currentAiEl.classList.remove('streaming');
    const content = fullReply || currentAiRaw;
    if (content) {
      currentAiEl.innerHTML = marked.parse(content);
      currentAiEl.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
      if (isRtl(content)) currentAiEl.setAttribute('dir', 'rtl');
    }
    currentAiEl = null;
    currentAiRaw = '';
  }
  Object.values(activeToolBadges).forEach(el => el.remove());
  activeToolBadges = {};
  enableInput();
}

function showToolBadge(name) {
  const labels = {
    web_search: '🔍 Searching web',
    wikipedia_search: '📖 Wikipedia',
    fetch_url: '🌐 Fetching page',
    get_weather: '🌤️ Weather',
    gmail_read: '📧 Reading Gmail',
    gmail_send: '📤 Sending email',
    calendar_list: '📅 Calendar',
    calendar_create: '📅 Creating event',
    drive_save_photo: '📸 Saving to Drive',
    drive_save_document: '📄 Saving to Drive',
    drive_list_files: '📁 Drive files',
    save_fact: '💾 Saving fact',
    save_rule: '📌 Saving rule',
    list_memory: '🧠 Memory',
    delete_fact: '🗑️ Deleting fact',
    delete_rule: '🗑️ Deleting rule',
    list_tuya_devices: '🏠 Smart home',
    get_device_status: '🏠 Device status',
    control_device: '🏠 Controlling device',
    google_connect: '🔗 Google auth',
  };
  if (activeToolBadges[name]) return;
  const badge = document.createElement('div');
  badge.className = 'tool-badge';
  badge.textContent = labels[name] || `⚙️ ${name}`;
  messagesEl.appendChild(badge);
  activeToolBadges[name] = badge;
  scrollBottom();
}

function hideToolBadge(name) {
  const badge = activeToolBadges[name];
  if (!badge) return;
  badge.classList.add('done');
  setTimeout(() => { badge.remove(); delete activeToolBadges[name]; }, 450);
}

// ── Send ────────────────────────────────────────────────────────────────────
inputForm.addEventListener('submit', e => {
  e.preventDefault();
  const text = messageInput.value.trim();
  if (!text && !pendingMediaId) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) return;

  const displayText = pendingFilename
    ? `📎 ${pendingFilename}${text ? '\n' + text : ''}`
    : text;
  addMessage('user', displayText);

  ws.send(JSON.stringify({ type: 'message', text, media_id: pendingMediaId || null }));

  messageInput.value = '';
  messageInput.style.height = 'auto';
  pendingMediaId = null;
  pendingFilename = null;
  hideUploadPreview();
  disableInput();
});

messageInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 200) + 'px';
});

messageInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    inputForm.dispatchEvent(new Event('submit'));
  }
});

function disableInput() {
  sendBtn.disabled = true;
  messageInput.disabled = true;
}

function enableInput() {
  sendBtn.disabled = false;
  messageInput.disabled = false;
  messageInput.focus();
}

// ── File upload ─────────────────────────────────────────────────────────────
fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) doUpload(file);
});

document.getElementById('upload-cancel-btn').addEventListener('click', () => {
  pendingMediaId = null;
  pendingFilename = null;
  fileInput.value = '';
  hideUploadPreview();
});

async function doUpload(file) {
  const form = new FormData();
  form.append('file', file);
  try {
    const res = await fetch('/api/upload', {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}` },
      body: form,
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    pendingMediaId = data.media_id;
    pendingFilename = data.filename;
    showUploadPreview(data.filename);
  } catch (err) {
    addSystemMsg(`⚠️ Upload failed: ${err.message}`);
  }
}

function showUploadPreview(fname) {
  uploadFilename.textContent = fname;
  uploadPreview.classList.remove('hidden');
}

function hideUploadPreview() {
  uploadPreview.classList.add('hidden');
  uploadFilename.textContent = '';
}

// Drag-and-drop onto messages area
messagesEl.addEventListener('dragover', e => { e.preventDefault(); messagesEl.classList.add('drag-over'); });
messagesEl.addEventListener('dragleave', () => messagesEl.classList.remove('drag-over'));
messagesEl.addEventListener('drop', e => {
  e.preventDefault();
  messagesEl.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) doUpload(file);
});

// ── Memory sidebar ──────────────────────────────────────────────────────────
async function loadMemory() {
  try {
    const res = await fetch('/api/memory', { headers: { Authorization: `Bearer ${token}` } });
    if (!res.ok) return;
    const { facts, rules } = await res.json();

    factsList.innerHTML = facts.length
      ? facts.map(f => `<li><strong>${escHtml(f.key)}</strong>: ${escHtml(f.value)}</li>`).join('')
      : '<li class="muted">No facts saved yet</li>';

    rulesList.innerHTML = rules.length
      ? rules.map(r => `<li>${escHtml(r.rule)}</li>`).join('')
      : '<li class="muted">No rules saved yet</li>';
  } catch { /* silent */ }
}

document.getElementById('refresh-memory-btn').addEventListener('click', loadMemory);

// ── Helpers ─────────────────────────────────────────────────────────────────
function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ── Auto-login ───────────────────────────────────────────────────────────────
if (token) {
  connectWebSocket();
} else {
  showLogin();
}
</script>
</body>
</html>
