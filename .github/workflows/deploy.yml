name: Deploy to PA Server

on:
  push:
    branches:
      - main

jobs:
  sanity:
    name: Sanity Tests
    runs-on: [self-hosted, pa]

    steps:
      - name: Pull latest code
        shell: bash
        run: |
          cd /d/Claude/pa
          git fetch origin main
          git reset --hard origin/main

      - name: Install dependencies
        shell: bash
        run: |
          cd /d/Claude/pa/backend
          pip install -r requirements.txt -r requirements-dev.txt -q

      - name: Run sanity tests
        shell: bash
        run: |
          cd /d/Claude/pa/backend
          python -m pytest tests/test_sanity.py -v

  deploy:
    name: Pull & Rebuild Backend
    runs-on: [self-hosted, pa]
    needs: sanity

    steps:
      - name: Pull latest code
        shell: bash
        run: |
          cd /d/Claude/pa
          git fetch origin main
          git reset --hard origin/main

      - name: Rebuild and restart backend
        shell: bash
        run: |
          cd /d/Claude/pa
          docker compose up --build -d backend

      - name: Verify backend is healthy
        shell: bash
        run: |
          cd /d/Claude/pa
          echo "Waiting for backend health check..."
          for i in $(seq 1 12); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' pa-backend 2>/dev/null || echo "missing")
            echo "  attempt $i: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Backend is healthy."
              exit 0
            fi
            sleep 5
          done
          echo "Backend did not become healthy within 60s."
          docker logs pa-backend --tail 40
          exit 1

      - name: Notify WhatsApp (success)
        if: success()
        shell: bash
        env:
          WAHA_BASE_URL: ${{ secrets.WAHA_BASE_URL }}
          WAHA_API_KEY: ${{ secrets.WAHA_API_KEY }}
          MY_WHATSAPP_ID: ${{ secrets.MY_WHATSAPP_ID }}
          WAHA_SESSION: ${{ secrets.WAHA_SESSION }}
        run: |
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          TEXT="[PA Deploy] SUCCESS%0A${COMMIT_SHA:0:7}: ${COMMIT_MSG}"

          curl -sf -X POST "${WAHA_BASE_URL}/api/sendText" \
            -H "Content-Type: application/json" \
            -H "X-Api-Key: ${WAHA_API_KEY}" \
            -d "{\"chatId\":\"${MY_WHATSAPP_ID}\",\"text\":\"[PA Deploy] SUCCESS\n${COMMIT_SHA:0:7}: ${COMMIT_MSG}\",\"session\":\"${WAHA_SESSION}\"}" \
            || echo "WhatsApp notification skipped (WAHA not reachable or secrets not set)"

      - name: Notify WhatsApp (failure)
        if: failure()
        shell: bash
        env:
          WAHA_BASE_URL: ${{ secrets.WAHA_BASE_URL }}
          WAHA_API_KEY: ${{ secrets.WAHA_API_KEY }}
          MY_WHATSAPP_ID: ${{ secrets.MY_WHATSAPP_ID }}
          WAHA_SESSION: ${{ secrets.WAHA_SESSION }}
        run: |
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)

          curl -sf -X POST "${WAHA_BASE_URL}/api/sendText" \
            -H "Content-Type: application/json" \
            -H "X-Api-Key: ${WAHA_API_KEY}" \
            -d "{\"chatId\":\"${MY_WHATSAPP_ID}\",\"text\":\"[PA Deploy] FAILED\n${COMMIT_SHA:0:7}: ${COMMIT_MSG}\nCheck Actions: https://github.com/${{ github.repository }}/actions\",\"session\":\"${WAHA_SESSION}\"}" \
            || echo "WhatsApp notification skipped (WAHA not reachable or secrets not set)"
