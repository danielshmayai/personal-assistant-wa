name: Deploy to PA Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sanity:
    name: Sanity Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps and run sanity tests
        run: |
          pip install -r backend/requirements.txt -r backend/requirements-dev.txt -q
          pytest backend/tests/test_sanity.py -v

  deploy:
    name: Pull & Rebuild Backend
    runs-on: ubuntu-latest
    needs: sanity
    env:
      DEPLOY_GATE: ${{ secrets.DEPLOY_GATE }}

    steps:
      - name: Verify deploy gate
        run: |
          if [ -z "$DEPLOY_GATE" ]; then
            echo "DEPLOY_GATE secret is not set — deployment blocked."
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          WAHA_BASE_URL: ${{ secrets.WAHA_BASE_URL }}
          WAHA_API_KEY: ${{ secrets.WAHA_API_KEY }}
          MY_WHATSAPP_ID: ${{ secrets.MY_WHATSAPP_ID }}
          WAHA_SESSION: ${{ secrets.WAHA_SESSION }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: WAHA_BASE_URL,WAHA_API_KEY,MY_WHATSAPP_ID,WAHA_SESSION,COMMIT_SHA,REPO
          script_stop: true
          # appleboy runs each line via the default shell; use explicit powershell.exe
          script: powershell -NoProfile -ExecutionPolicy Bypass -Command "
            Set-Location D:\Claude\pa;
            git fetch origin main;
            git reset --hard origin/main;
            docker compose up --build -d backend;

            Write-Host 'Waiting for backend to become healthy...';
            $ok = $false;
            for ($i = 1; $i -le 18; $i++) {
              $s = docker inspect --format='{{.State.Health.Status}}' pa-backend 2>$null;
              Write-Host \"  attempt $i`: $s\";
              if ($s -eq 'healthy') { $ok = $true; break }
              Start-Sleep -Seconds 5
            };
            if (-not $ok) {
              docker logs pa-backend --tail 50;
              \$env:MSG = '[PA Deploy] FAILED https://github.com/' + \$env:REPO + '/actions'
            } else {
              \$sha = \$env:COMMIT_SHA.Substring(0,7);
              \$env:MSG = '[PA Deploy] SUCCESS ' + \$sha
            };

            \$body = '{\"chatId\":\"' + \$env:MY_WHATSAPP_ID + '\",\"text\":\"' + \$env:MSG + '\",\"session\":\"' + \$env:WAHA_SESSION + '\"}';
            try {
              Invoke-RestMethod -Uri \"\$env:WAHA_BASE_URL/api/sendText\" -Method Post -ContentType 'application/json' -Headers @{'X-Api-Key'=\$env:WAHA_API_KEY} -Body \$body
            } catch { Write-Host 'WA notify skipped: ' + \$_ };

            if (-not \$ok) { exit 1 }
          "
